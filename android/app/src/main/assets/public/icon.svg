<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />
  
  <!-- Main Icon Elements -->
  <g filter="url(#shadow)">
    <!-- Stylized Chart/Growth Line -->
    <path d="M140 340 L220 260 L280 300 L380 180" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Arrow Head -->
    <path d="M320 180 L380 180 L380 240" fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Decorative Dots/Data Points -->
    <circle cx="140" cy="340" r="12" fill="white" />
    <circle cx="220" cy="260" r="12" fill="white" />
    <circle cx="280" cy="300" r="12" fill="white" />
    <circle cx="380" cy="180" r="16" fill="#10B981" stroke="white" stroke-width="4" />
  </g>
  
  <!-- Subtle Overlay for Depth -->
  <rect width="512" height="512" rx="120" fill="white" opacity="0.05" />
</svg>
